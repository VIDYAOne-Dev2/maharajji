<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neem Karoli Baba Tribute Footer - Bold Edition</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        // Bold Spiritual Palette
                        deepSaffron: '#C94A29', // Rich, commanding terracotta-saffron
                        sacredGold: '#F4B251',  // Vibrant glowing amber gold
                        pureIvory: '#FFFDF9',   // Crisp, luminous warm off-white
                        velvetCrimson: '#4A150B' // Deep background shadow accent
                    },
                    letterSpacing: {
                        editorial: '0.2em',
                        branding: '0.28em'
                    }
                }
            }
        }
    </script>

    <style>
        .premium-transition {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Intensely radiant light glow */
        .gold-glow:hover {
            color: #FFFDF9 !important;
            text-shadow: 0 0 15px rgba(244, 178, 81, 0.8);
        }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-15px) scale(1.2); opacity: 0.5; }
        }
        .spark {
            animation: floatSlow 7s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen flex flex-col justify-end antialiased">

    <!-- BOLD, HIGH-CONTRAST PREMIUM FOOTER -->
    <footer class="relative w-full bg-gradient-to-b from-deepSaffron to-velvetCrimson pt-24 pb-12 px-6 overflow-hidden text-pureIvory">
        
        <!-- Deep Ambient Top Border (Visual Divider) -->
        <div class="absolute top-0 inset-x-0 h-[1px] bg-pureIvory/20"></div>
        
        <!-- Radiant Internal Hearth Glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[350px] bg-radial from-sacredGold/25 to-transparent blur-3xl pointer-events-none"></div>
        
        <!-- Golden Sparks / Floating Micro Particles -->
        <div class="spark absolute bottom-24 left-[12%] w-[3px] h-[3px] bg-sacredGold rounded-full"></div>
        <div class="spark absolute bottom-44 right-[18%] w-[2px] h-[2px] bg-pureIvory rounded-full" style="animation-delay: 2.5s;"></div>
        <div class="spark absolute top-20 left-[45%] w-[1.5px] h-[1.5px] bg-sacredGold/60 rounded-full" style="animation-delay: 4s;"></div>

        <div class="max-w-4xl mx-auto relative z-10 flex flex-col items-center">
            
            <!-- 1. Spiritual Message Statement -->
            <div class="text-center mb-14 select-none">
                <p class="font-serif italic text-3xl lg:text-5xl text-pureIvory/95 tracking-wide font-medium">
                    “Love Everyone. Serve Everyone.”
                </p>
            </div>

            <!-- 2. Minimal Navigation Links -->
            <nav class="flex flex-wrap justify-center items-center gap-x-8 gap-y-4 mb-16 text-[12px] font-sans tracking-editorial text-pureIvory/70 uppercase font-normal">
                <a href="#home" class="premium-transition hover:text-sacredGold">Home</a>
                <a href="#about" class="premium-transition hover:text-sacredGold">About</a>
                <a href="#teachings" class="premium-transition hover:text-sacredGold">Teachings</a>
                <a href="#ashram" class="premium-transition hover:text-sacredGold">Ashram & Dham</a>
                <a href="#books" class="premium-transition hover:text-sacredGold">Books</a>
                <a href="#gallery" class="premium-transition hover:text-sacredGold">Gallery</a>
            </nav>

            <!-- 3. Dynamic Sub-line Tribute -->
            <div class="text-center mb-10">
                <p class="font-serif italic text-sacredGold/80 text-lg tracking-wider">
                    A humble digital tribute to Maharajji.
                </p>
            </div>

            <!-- 4. Subtle Creative Branding & Copyright Layer -->
            <div class="w-full flex flex-col sm:flex-row items-center justify-between pt-8 border-t border-pureIvory/10 text-[10px] font-sans tracking-editorial text-pureIvory/40 uppercase">
                
                <!-- Left: Copyright -->
                <div class="mb-4 sm:mb-0 select-none tracking-widest text-pureIvory/50">
                    &copy; 2026 All Sacred Rights Reserved.
                </div>

                <!-- Right: High-End VIDYAOne Attribution -->
                <div class="text-center sm:text-right">
                    <span class="text-[9px] tracking-widest text-pureIvory/30">Crafted by</span>
                    <a href="https://vidyaone.com" target="_blank" rel="noopener noreferrer" 
                       class="premium-transition text-[11px] font-semibold tracking-branding text-pureIvory/80 uppercase ml-1.5 gold-glow">
                        VIDYA<span class="font-light text-sacredGold">One</span>
                    </a>
                </div>

            </div>

        </div>
    </footer>

</body>
</html>
