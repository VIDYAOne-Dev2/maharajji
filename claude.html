<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Gallery | Neem Karoli Baba Tribute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        body {
            background-color: #FDFBF7;
            /* Warm Cream */
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .masonry-grid {
            column-count: 1;
            column-gap: 2rem;
        }

        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .saffron-glow {
            box-shadow: 0 0 40px -10px rgba(255, 153, 51, 0.2);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        .reveal-on-scroll.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="overflow-x-hidden text-[#3D352F]">

    <!-- Decorative Subtle Mandala Background -->
    <div class="fixed inset-0 pointer-events-none flex items-center justify-center opacity-[0.03] overflow-hidden">
        <svg width="800" height="800" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path fill="currentColor"
                d="M100 0C86.7 0 73.5 13.2 73.5 13.2S60.3 0 47.1 0 20.6 26.5 20.6 26.5 0 39.7 0 52.9s13.2 26.5 13.2 26.5S0 92.6 0 105.9s20.6 26.5 20.6 26.5 26.5 26.5 39.7 26.5 13.2-13.2 13.2-13.2 13.2 13.2 26.5 13.2 39.7-26.5 39.7-26.5 20.6-13.2 20.6-26.5-13.2-26.5-13.2-26.5 13.2-13.2 13.2-26.5-20.6-52.9-20.6-52.9-13.2-26.5-26.5-26.5z"
                transform="translate(100 100) scale(0.8) translate(-100 -100)" />
        </svg>
    </div>

    <!-- Gallery Section Container -->
    <section class="relative min-h-screen py-24 px-6 md:px-12 lg:px-24">

        <!-- Header -->
        <div class="max-w-7xl mx-auto text-center mb-16 reveal-on-scroll">
            <span class="uppercase tracking-[0.3em] text-sm font-medium text-orange-600/80 mb-4 block">Divine
                Gallery</span>
            <h1 class="font-serif text-5xl md:text-7xl mb-6 text-[#2D241E] leading-tight italic">Sacred Moments &
                Spiritual Presence
            </h1>
            <p class="text-lg text-stone-500 font-light max-w-2xl mx-auto leading-relaxed">
                A timeless collection of peaceful moments, sacred places, and spiritual memories connected to Maharajji.
            </p>
        </div>


        <!-- Masonry Gallery -->
        <div class="masonry-grid w-full">

            <!-- Large Portrait Image -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-1081.jpg"
                        alt="Himalayan Peaks"
                        class="w-full h-auto transition-transform duration-1000 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end p-8">
                        <p class="text-white font-serif italic text-xl">The Himalayan Silence</p>
                    </div>
                </div>
            </div>

            <!-- Floating Quote Card -->
            <div
                class="gallery-item py-12 px-8 bg-orange-50/50 rounded-[32px] border border-orange-100 text-center flex flex-col justify-center items-center">
                <span class="text-4xl text-orange-300 mb-6 font-serif">“</span>
                <p class="font-serif text-2xl text-stone-700 italic leading-snug">
                    "Love everyone, feed everyone, remember God, tell the truth."
                </p>
                <p class="mt-6 uppercase tracking-widest text-[10px] text-orange-600 font-semibold">— Maharajji</p>
            </div>

            <!-- Vintage Style Image -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-1062.jpg"
                        alt="Incense and Rituals"
                        class="w-full h-auto grayscale hover:grayscale-0 transition-all duration-1000 group-hover:scale-105">
                    <div class="absolute inset-0 bg-orange-900/10 mix-blend-overlay"></div>
                </div>
            </div>

            <!-- Featured Large Image -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer aspect-[3/4]">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-867.jpg"
                        alt="Temple Architecture"
                        class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute top-6 right-6">
                        <div
                            class="bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-white text-xs border border-white/30">
                            Architecture</div>
                    </div>
                </div>
            </div>

            <!-- Bell/Detail Image -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-826.jpg"
                        alt="Temple Bells"
                        class="w-full h-auto transition-transform duration-1000 group-hover:rotate-1">
                </div>
            </div>

            <!-- Saffron Glow Featured Portrait -->
            <div class="gallery-item group relative">
                <div
                    class="absolute -inset-2 bg-gradient-to-r from-orange-400/20 to-yellow-400/20 blur-2xl rounded-[40px] opacity-0 group-hover:opacity-100 transition-opacity duration-700">
                </div>
                <div class="relative overflow-hidden rounded-[32px] cursor-pointer shadow-lg">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-827.jpg"
                        alt="Spiritual Lighting" class="w-full h-auto">
                </div>
            </div>

            <!-- Wide Landscape -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-828.jpg"
                        alt="Valley" class="w-full h-auto brightness-95 group-hover:brightness-105 transition-all">
                </div>
            </div>

            <!-- Soft Bokeh Detail -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-833.jpg"
                        alt="Devotion" class="w-full h-auto group-hover:scale-105 transition-transform duration-1000">
                </div>
            </div>

            <!-- Featured Large Image -->
            <div class="gallery-item group">
                <div class="relative overflow-hidden rounded-[32px] saffron-glow cursor-pointer aspect-[3/4]">
                    <img src="https://www.maharajji.love/files/images/Maharajjis_satsang_indians/images/large/Maharajji-877.jpg"
                        alt="Temple Architecture"
                        class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute top-6 right-6">
                        <div
                            class="bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-white text-xs border border-white/30">
                            Architecture</div>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <script>
        // Simple Scroll Animation Observer
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal-on-scroll').forEach((el) => {
            observer.observe(el);
        });

        // Add delayed reveal for gallery items
        document.querySelectorAll('.gallery-item').forEach((item, index) => {
            item.style.transitionDelay = `${index * 0.05}s`;
            item.classList.add('reveal-on-scroll');
            observer.observe(item);
        });
    </script>
</body>

</html>
